services:
  # Backend Web Service (Express API)
  - type: web
    name: trakr-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # You will input your MongoDB Connection String in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site (React/Vite)
  - type: web
    name: trakr-client
    env: static
    plan: free
    rootDir: client
    buildCommand: npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
